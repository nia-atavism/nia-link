version: "3.8"

services:
  nia-link:
    build: .
    container_name: nia-link
    ports:
      - "8000:8000"
    volumes:
      - ./registry:/app/registry # 持久化 Action Map 註冊表與 Sessions
      - ./tmp:/app/tmp # 截圖與軌跡 JSON
    env_file:
      - .env
    environment:
      - HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200" ]
      interval: 30s
      timeout: 10s
      retries: 3
